<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parker Scanner</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="scanner-body">
  <main class="scanner-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Parker Scanner</h1>
        <p id="sessionLine">Looking for active count session...</p>
      </div>
      <span id="netStatus" class="status warn">Connecting</span>
    </header>

    <section class="panel scanner-camera-panel">
      <div id="reader"></div>
      <div id="result" class="result warn">Point the camera at an inventory QR tag.</div>
      <div class="form-actions">
        <button id="startCamera">Start camera</button>
        <button id="stopCamera" class="secondary">Stop</button>
        <button id="startPhoneSession" class="secondary" type="button">Start count here</button>
      </div>
      <form id="manualScanForm" class="manual-scan">
        <label>Manual tag entry<input id="manualTag" inputmode="text" autocomplete="off" placeholder="W-001"></label>
        <button type="submit">Log tag</button>
      </form>
      <button id="toggleNewItem" class="secondary scanner-add-toggle" type="button">Add new item</button>
      <form id="newItemForm" class="scanner-new-item hidden">
        <div class="scanner-form-grid">
          <label>Category<select id="newItemCategory" required></select></label>
          <label>Tag #<input id="newItemTag" inputmode="text" autocomplete="off" required></label>
          <label>Item Number<input id="newItemNumber" autocomplete="off"></label>
          <label>Description<textarea id="newItemDescription" rows="2"></textarea></label>
        </div>
        <label class="check-row"><input id="printNewItem" type="checkbox" checked> Print QR after save</label>
        <div class="form-actions scanner-new-actions">
          <button type="submit">Save item</button>
          <button id="refreshNewTag" class="secondary" type="button">Next tag</button>
        </div>
      </form>
    </section>

    <section class="panel scanner-history-panel">
      <h2>Scan History</h2>
      <div id="history" class="history"></div>
    </section>
  </main>
  <div id="singlePrintSheet" class="single-print-sheet"></div>

  <script src="/vendor/html5-qrcode/html5-qrcode.min.js"></script>
  <script src="/config.js"></script>
  <script src="/scanner.js"></script>
</body>
</html>
