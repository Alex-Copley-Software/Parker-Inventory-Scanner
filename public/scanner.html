<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parker Scanner</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="/vendor/html5-qrcode/html5-qrcode.min.js" defer></script>
</head>
<body class="scanner-body">
  <main class="scanner-shell">
    <header class="topbar">
      <div class="brand">
        <h1>Parker Scanner</h1>
        <p id="sessionLine">Looking for active count session...</p>
      </div>
      <span id="netStatus" class="status warn">Connecting</span>
    </header>

    <section class="panel">
      <div id="reader"></div>
      <div id="result" class="result warn">Point the camera at an inventory QR tag.</div>
      <div class="form-actions">
        <button id="startCamera">Start camera</button>
        <button id="stopCamera" class="secondary">Stop</button>
      </div>
    </section>

    <section class="panel">
      <h2>Scan History</h2>
      <div id="history" class="history"></div>
    </section>
  </main>

  <script src="/config.js"></script>
  <script src="/scanner.js"></script>
</body>
</html>
